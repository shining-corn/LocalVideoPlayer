<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Local Video Player</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .video {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            display: block;
            background: #000;
        }

        .video.is-hidden {
            display: none;
        }

        .media-preview {
            display: none;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .media-preview.active {
            display: block;
        }

        .video-frame {
            overflow: hidden;
            resize: both;
            padding: 0;
            box-sizing: border-box;
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-frame.dragover {
            outline: 4px dashed #3b82f6;
            background: rgba(59,130,246,0.04);
        }

        #controls {
            padding: 8px 10px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        #controls > div {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #playbackRate {
            margin-left: auto;
        }
    </style>
</head>

<body>
    <div class="video-frame">
        <video id="video" class="video" loop controls></video>
        <img id="mediaPreview" class="media-preview" alt="Selected image" />
    </div>

    <div id="controls">
        <div>
            <input id="fileSelector" type="file" accept="video/*,image/*"/>
        </div>

        <div>
            <label for="playbackRate">再生速度</label>
            <select id="playbackRate">
                <option value="0.5">0.5</option>
                <option value="0.75">0.75</option>
                <option value="1" selected>1</option>
                <option value="1.25">1.25</option>
                <option value="1.5">1.5</option>
                <option value="2">2</option>
            </select>
        </div>
    </div>

    <script>
        function formatVideoTime(time) {
            const hours = Math.floor(time / 3600);
            const minutes = `${Math.floor((time / 60) % 3600)}`.padStart(2, '0');
            const seconds = `${Math.floor(time % 60)}`.padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        (() => {
            const tagVideo = document.getElementById('video');
            const tagMediaPreview = document.getElementById('mediaPreview');
            const tagFileSelector = document.getElementById('fileSelector');
            const tagPlaybackRate = document.getElementById('playbackRate');
            const videoFrame = document.querySelector('.video-frame');

            let currentObjectUrl = null;

            function getMediaKind(file) {
                if (!file) return null;
                const fileName = (file.name || '').toLowerCase();
                const hasImageType = file.type.startsWith('image/') || /\.(png|jpe?g|gif|bmp|webp|svg)$/i.test(fileName);
                const hasVideoType = file.type.startsWith('video/') || /\.(mp4|webm|ogg|mov|avi|mkv|m4v)$/i.test(fileName);
                if (hasImageType) return 'image';
                if (hasVideoType) return 'video';
                return null;
            }

            function showVideo() {
                tagVideo.controls = true;
                tagVideo.classList.remove('is-hidden');
                tagMediaPreview.classList.remove('active');
                tagMediaPreview.hidden = true;
                tagMediaPreview.removeAttribute('src');
            }

            function showImage(url, fileName) {
                tagVideo.pause();
                tagVideo.removeAttribute('src');
                tagVideo.load();
                tagVideo.classList.add('is-hidden');
                tagMediaPreview.src = url;
                tagMediaPreview.alt = fileName || 'Selected image';
                tagMediaPreview.classList.add('active');
                tagMediaPreview.hidden = false;
            }

            function openFile(file) {
                if (!file) return;
                const mediaKind = getMediaKind(file);
                try {
                    if (currentObjectUrl) {
                        URL.revokeObjectURL(currentObjectUrl);
                        currentObjectUrl = null;
                    }
                } catch (e) {
                    console.error(e);
                }

                if (mediaKind === 'image') {
                    currentObjectUrl = URL.createObjectURL(file);
                    showImage(currentObjectUrl, file.name);
                    return;
                }

                if (mediaKind === 'video') {
                    currentObjectUrl = URL.createObjectURL(file);
                    tagVideo.src = currentObjectUrl;
                    tagVideo.load();
                    tagVideo.play().catch(() => { });
                    showVideo();
                    return;
                }

                showVideo();
            }

            tagFileSelector.addEventListener('change', (e) => {
                const file = e.target.files && e.target.files[0];
                openFile(file);
            });

            tagPlaybackRate.addEventListener('change', (e) => {
                tagVideo.playbackRate = e.target.value;
                tagVideo.defaultPlaybackRate = e.target.value;
            });

            // Drag & drop handlers on the video frame
            videoFrame.addEventListener('dragover', (e) => {
                e.preventDefault();
                videoFrame.classList.add('dragover');
            });

            videoFrame.addEventListener('dragenter', (e) => {
                e.preventDefault();
                videoFrame.classList.add('dragover');
            });

            videoFrame.addEventListener('dragleave', (e) => {
                e.preventDefault();
                videoFrame.classList.remove('dragover');
            });

            videoFrame.addEventListener('drop', (e) => {
                e.preventDefault();
                videoFrame.classList.remove('dragover');
                const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                openFile(file);
            });

            // sizing is handled by CSS flexbox; no JS resize needed
        })();
    </script>
</body>

</html>
