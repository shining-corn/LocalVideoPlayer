<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Local Video Player</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
        }
        .video {
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            display: block;
            background: #000;
        }

        .video-frame {
            overflow: hidden;
            resize: both;
            padding: 10px;
            box-sizing: border-box;
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .video-frame.dragover {
            outline: 4px dashed #3b82f6;
            background: rgba(59,130,246,0.04);
        }
    </style>
</head>

<body>
    <div class="video-frame">
        <video id="video" class="video" loop controls></video>
    </div>

    <div id="controls">
        <div>
            <input id="fileSelector" type="file" accept="video/*"/>
        </div>

        再生速度
        <select id="playbackRate">
        <option value="0.5">0.5</option>
        <option value="0.75">0.75</option>
        <option value="1" selected>1</option>
        <option value="1.25">1.25</option>
        <option value="1.5">1.5</option>
        <option value="2">2</option>
    </select>
    </div>

    <style>
        #controls { padding:8px 10px; box-sizing:border-box; }
    </style>

    <script>
        function formatVideoTime(time) {
            const hours = Math.floor(time / 3600);
            const minutes = `${Math.floor((time / 60) % 3600)}`.padStart(2, '0');
            const seconds = `${Math.floor(time % 60)}`.padStart(2, '0');
            return `${hours}:${minutes}:${seconds}`;
        }

        (() => {
            const tagVideo = document.getElementById('video');
            const tagFileSelector = document.getElementById('fileSelector');
            const tagPlaybackRate = document.getElementById('playbackRate');
            const videoFrame = document.querySelector('.video-frame');

            let currentObjectUrl = null;

            function openFile(file) {
                if (!file) return;
                try {
                    if (currentObjectUrl) {
                        URL.revokeObjectURL(currentObjectUrl);
                        currentObjectUrl = null;
                    }
                } catch (e) {
                    console.error(e);
                }

                currentObjectUrl = URL.createObjectURL(file);
                tagVideo.src = currentObjectUrl;
                tagVideo.load();
                tagVideo.play().catch(() => { });
            }

            tagFileSelector.addEventListener('change', (e) => {
                const file = e.target.files && e.target.files[0];
                openFile(file);
            });

            tagPlaybackRate.addEventListener('change', (e) => {
                tagVideo.playbackRate = e.target.value;
                tagVideo.defaultPlaybackRate = e.target.value;
            });

            // Drag & drop handlers on the video frame
            videoFrame.addEventListener('dragover', (e) => {
                e.preventDefault();
                videoFrame.classList.add('dragover');
            });

            videoFrame.addEventListener('dragenter', (e) => {
                e.preventDefault();
                videoFrame.classList.add('dragover');
            });

            videoFrame.addEventListener('dragleave', (e) => {
                e.preventDefault();
                videoFrame.classList.remove('dragover');
            });

            videoFrame.addEventListener('drop', (e) => {
                e.preventDefault();
                videoFrame.classList.remove('dragover');
                const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
                openFile(file);
            });

            // sizing is handled by CSS flexbox; no JS resize needed
        })();
    </script>
</body>

</html>
